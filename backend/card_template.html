<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=750, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 750px; height: 1334px;
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
    background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #eaeaea;
    display: flex; flex-direction: column;
    padding: 60px 50px;
    overflow: hidden;
  }
  .header {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 48px;
  }
  .logo {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, #e94560, #c23152);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; color: #fff;
  }
  .app-name { font-size: 28px; font-weight: 700; color: #e94560; }
  .source-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 24px;
  }
  .source-tag {
    background: rgba(233, 69, 96, 0.2);
    color: #e94560;
    padding: 6px 16px; border-radius: 20px;
    font-size: 22px;
  }
  .title {
    font-size: 40px; font-weight: 800; line-height: 1.3;
    color: #fff; margin-bottom: 40px;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .points {
    flex: 1; display: flex; flex-direction: column; gap: 24px;
  }
  .point {
    display: flex; align-items: flex-start; gap: 16px;
    font-size: 26px; line-height: 1.5; color: #ccc;
  }
  .bullet {
    width: 10px; height: 10px;
    background: #e94560; border-radius: 50%;
    margin-top: 14px; flex-shrink: 0;
  }
  .divider {
    width: 120px; height: 2px;
    background: rgba(233, 69, 96, 0.4);
    margin: 32px 0;
  }
  .slogan {
    font-size: 24px; color: #888;
    margin-bottom: 48px;
  }
  .footer {
    display: flex; flex-direction: column; align-items: center;
    gap: 16px;
  }
  .qr-placeholder {
    width: 160px; height: 160px;
    border: 2px dashed rgba(255,255,255,0.2);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    color: #666; font-size: 22px;
  }
  .qr-hint {
    font-size: 22px; color: #888;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="logo">🎧</div>
    <div class="app-name">链接解牛</div>
  </div>
  <div class="source-row">
    <span class="source-tag">{{source_name}}</span>
  </div>
  <div class="title">{{title}}</div>
  <div class="points">
    {{#points}}
    <div class="point">
      <div class="bullet"></div>
      <span>{{.}}</span>
    </div>
    {{/points}}
  </div>
  <div class="divider"></div>
  <div class="slogan">粘贴链接，秒懂长内容</div>
  <div class="footer">
    <!-- QR code image injected here -->
    <div class="qr-hint">微信扫码体验</div>
  </div>
</body>
</html>
